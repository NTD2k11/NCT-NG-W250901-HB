<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chi tiết bài viết - BlogHub</title>
    <link rel="stylesheet" href="../DarkLightMode/theme.css">
    <link rel="stylesheet" href="/SPCK-NextGen/Blog/post-detail.css">
</head>
<body>
    <header class="detail-header">
        <div class="header-inner">
            <a class="back-link" href="/SPCK-NextGen/Home/home-modern.html">Quay lại Trang chủ</a>
            <div class="header-actions">
                <button class="btn-icon" aria-label="Đổi giao diện"><i class="fas fa-moon"></i></button>
            </div>
        </div>
    </header>

 <main class="detail-container">

    <section class="hero">
        <img id="postImage" src="https://images.unsplash.com/photo-1517694712202-14dd9538aa97?w=1200" alt="">
        <div class="hero-overlay">
            <span id="postCategory" class="category">Khác</span>
            <h1 id="postTitle">Đang tải bài viết...</h1>

            <div class="meta-row">
                <span id="postAuthor">Ẩn danh</span>
                <span class="dot">•</span>
                <span id="postDate">Vừa xong</span>
                <span class="dot">•</span>
                <span>👁️ <strong id="postViews">0</strong></span>
                <span>❤️ <strong id="postLikes">0</strong></span>
            </div>
        </div>
    </section>

    <section class="content-wrap">
        <article id="postContent" class="content"></article>
    </section>

    <div class="action-bar">
        <button id="likeBtn">❤️ <span id="likeCount">0</span></button>
        <button id="shareBtn">🔗 Chia sẻ</button>
    </div>


    <div id="postEmpty" class="empty" hidden>
        Không tìm thấy bài viết hoặc bài viết đã bị gỡ.
    </div>
    
    <section class="comments" id="comments-section">
        <h2>Bình luận</h2>

        <div class="comment-form">
            <textarea id="comment-text" rows="3" placeholder="Viết bình luận..."></textarea>
            <div class="comment-actions">
                <button id="submit-comment">Gửi bình luận</button>
            </div>
        </div>

        <div id="comments-list" class="comments-list">

        </div>
    </section>
</main>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/js/all.min.js"></script>
    <script type="module" src="/SPCK-NextGen/Blog/post-detail.js"></script>
    <script src="../DarkLightMode/theme.js"></script>
</body>
</html>
