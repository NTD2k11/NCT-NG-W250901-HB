<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng nhập - BlogHub</title>
    <link rel="stylesheet" href="auth.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <link rel="stylesheet" href="../DarkLightMode/theme.css">
</head>
<body>
    
    <div class="auth-container">
        <div class="auth-card">
            <div class="auth-header">
                <h1>📝 BlogHub</h1>
                <p>Đăng nhập vào tài khoản của bạn</p>
                <button class="btn-icon"><i class="fas fa-moon"></i></button>
            </div>

            <form id="loginForm" class="auth-form">
                <div class="form-group">
                    <label for="email">Email</label>
                    <input 
                        type="email" 
                        id="email" 
                        name="email" 
                        placeholder="your@email.com"
                        autocomplete="email"
                        required
                    />
                </div>

                <div class="form-group">
                    <label for="password">Mật khẩu</label>
                    <input 
                        type="password" 
                        id="password" 
                        name="password" 
                        placeholder="Nhập mật khẩu"
                        autocomplete="current-password"
                        required
                    />
                </div>

                <div class="form-group checkbox">
                    <input type="checkbox" id="rememberMe" name="rememberMe" />
                    <label for="rememberMe">Ghi nhớ tôi</label>
                </div>

                <button type="submit" class="btn btn-primary btn-block">Đăng nhập</button>
            </form>

            <div class="auth-footer">
                <p>Chưa có tài khoản? <a href="signup.html">Đăng ký ngay</a></p>
                <p><a href="../Home/Dashboard/dashboard.html">→ Đi đến Dashboard</a> | <a href="../Profile/account.html">👤 Tài khoản</a> | <a href="../index.html">← Quay lại trang chủ</a></p>
            </div>
        </div>

        <div class="auth-bg">
            <div class="bg-shape bg-1"></div>
            <div class="bg-shape bg-2"></div>
            <div class="bg-shape bg-3"></div>
        </div>
    </div>

    <script type="module" src="auth.js"></script>
<script src="../DarkLightMode/theme.js"></script>
    </body>
    </html>
